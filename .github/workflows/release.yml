name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    strategy:
      matrix:
        include:
          - { runner: ubuntu-latest,     goos: linux,  goarch: amd64 }
          - { runner: ubuntu-24.04-arm,  goos: linux,  goarch: arm64 }
          - { runner: macos-latest,      goos: darwin, goarch: arm64 }
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-tags: true
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: false
      - name: Build
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          if [[ ! "${VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "FATAL: release tag must use vX.Y.Z format" >&2
            exit 1
          fi
          COMMIT="$(git rev-parse --short HEAD)"
          LDFLAGS="-X go.kenn.io/docbank/internal/version.Version=${VERSION} \
                   -X go.kenn.io/docbank/internal/version.Commit=${COMMIT}"
          go build -tags fts5 -trimpath -ldflags "${LDFLAGS}" -o dist/docbank ./cmd/docbank
          ./dist/docbank --version
      - name: Package
        env:
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/v}"
          ARCHIVE="docbank_${VERSION}_${GOOS}_${GOARCH}.tar.gz"
          tar -C dist -czf "${ARCHIVE}" docbank
          mkdir -p out && mv "${ARCHIVE}" out/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: docbank-${{ matrix.goos }}-${{ matrix.goarch }}
          path: out/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write # gh release create uploads archives and checksums
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: assets
          merge-multiple: true
      - name: Checksums
        run: |
          set -euo pipefail
          cd assets
          sha256sum -- *.tar.gz > SHA256SUMS
          cat SHA256SUMS
      - name: Read annotated tag message
        id: tag_message
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_TYPE="$(git for-each-ref --format='%(objecttype)' "refs/tags/${TAG}")"
          if [[ -z "${TAG_TYPE}" ]]; then
            echo "FATAL: checkout did not fetch ${TAG}" >&2
            exit 1
          fi
          if [[ "${TAG_TYPE}" == "tag" ]]; then
            git for-each-ref --format='%(contents:body)' "refs/tags/${TAG}" > release-notes.md
          else
            : > release-notes.md
          fi
          if [[ -s release-notes.md ]]; then
            echo "has_body=true" >> "${GITHUB_OUTPUT}"
          else
            echo "has_body=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          HAS_TAG_BODY: ${{ steps.tag_message.outputs.has_body }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES_ARGS=(--generate-notes)
          if [[ "${HAS_TAG_BODY}" == "true" ]]; then
            NOTES_ARGS=(--notes-file release-notes.md)
          fi
          gh release create "${TAG}" assets/* \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${TAG}" \
            --verify-tag \
            "${NOTES_ARGS[@]}"
