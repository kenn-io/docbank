[project]
site_name = "docbank"
site_description = "Docbank is a self-sovereign document system for people and agents, with indexed retrieval, stable identity, verifiable content, incremental recovery, and audited history."
site_author = "Kenn Software LLC"
copyright = 'Copyright &copy; 2026 <a href="https://kenn.io">Kenn Software LLC</a>.'
docs_dir = "docs"
site_dir = "site"
repo_url = "https://github.com/kenn-io/docbank"
repo_name = "kenn-io/docbank"
extra_css = ["stylesheets/extra.css"]
use_directory_urls = true
nav = [
  {"Overview" = "index.md"},
  {"Start Here" = [
    {"Setup" = "setup.md"},
    {"Quickstart" = "quickstart.md"},
  ]},
  {"Work with Documents" = [
    {"Importing Documents" = "usage/importing.md"},
    {"Organizing & Tagging" = "usage/organizing.md"},
    {"Searching" = "usage/searching.md"},
  ]},
  {"Protect & Operate" = [
    {"Vault Lifecycle" = "usage/lifecycle.md"},
    {"Permanent Audited History" = "usage/audited-history.md"},
    {"Trash, GC, Repack & Verify" = "usage/trash-and-gc.md"},
    {"Backup & Restore" = "usage/backup.md"},
    {"Troubleshooting" = "troubleshooting.md"},
  ]},
  {"Automate & Integrate" = [
    {"Docbank for Agents" = "agents.md"},
    {"Agent Integration Guide" = "agents/integration.md"},
    {"Embed in Go" = "embedding.md"},
  ]},
  {"Reference" = [
    {"CLI Reference" = "cli-reference.md"},
    {"Configuration" = "configuration.md"},
    {"HTTP API" = "architecture/http-api.md"},
  ]},
  {"How It Works" = [
    {"How Docbank Works" = "architecture/overview.md"},
    {"Storage" = "architecture/storage.md"},
    {"Loose & Packed Content" = "architecture/packed-storage.md"},
    {"Editing & Versions" = "architecture/editing-and-versions.md"},
    {"Ownership & Concurrency" = "architecture/locking.md"},
    {"Daemon & Process Model" = "architecture/daemon.md"},
    {"Backup & Recovery" = "architecture/backup.md"},
    {"Integrity & Trust" = "architecture/integrity.md"},
    {"Audited History" = "architecture/audited-history.md"},
  ]},
  {"Project" = [
    {"Roadmap" = "roadmap.md"},
    {"Changelog" = "changelog.md"},
  ]},
]

[project.extra]
homepage = "/"

[project.theme]
variant = "modern"
features = [
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.tracking",
  "navigation.sections",
  "navigation.path",
  "content.code.copy",
]

[project.theme.palette]
scheme = "slate"
primary = "custom"
accent = "custom"

[project.theme.icon]
repo = "fontawesome/brands/github"
edit = "lucide/pencil"
view = "lucide/file-code"

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
