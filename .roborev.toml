review_guidelines = """
docbank is a single-user personal document archive: a local daemon owns
the vault (SQLite + content-addressed blobs) and the CLI, agents, and a
future web UI are HTTP clients of its loopback API. Not designed for
multi-user, multi-tenant, or internet-facing deployment.

Key assumptions reviewers MUST account for:

1. COMPILATION IS CI'S JOB. The tree is gated by `go build`, `go vet`,
   and the full test suite with `-tags fts5` and CGO on Linux, macOS,
   and Windows before any review runs. Do not report "this does not
   compile" findings; if code looks syntactically impossible, verify
   against the go.mod language version before flagging (see 2), and
   prefer flagging logic over legality.

2. GO VERSION: go.mod pins Go 1.26+. Go 1.26 added value-form `new(v)`,
   which returns `*T` pointing to v — e.g. `new("clean")` is valid and
   yields a `*string`. DO NOT flag value-form `new` calls as "new
   requires a type" compile errors; that was true through 1.25 only.
   Likewise, `go build -o dist/docbank` creates missing parent
   directories on this toolchain (verified on the Go 1.26 line;
   CI pins that line via go-version-file) — do not flag a missing
   `mkdir -p dist` in the release workflow.

3. BUILD TAGS: everything builds and tests with `-tags fts5` and CGO
   enabled (`make test`). A failure of an untagged `go build`/`go test`
   is not a finding.

4. AUTH MODEL: the daemon always enforces an API key. An empty
   configured `api_key` means the daemon generates an ephemeral per-run
   key at startup and publishes it through the runtime record inside
   the owner-private $DOCBANK_HOME (0700 on Unix, a restricted DACL on
   Windows) — readable only by the vault owner, exactly
   like the shutdown token. Keyless config is therefore NOT
   unauthenticated. Binds are loopback-only by validation; the API is
   plain HTTP by design and remote access is documented as SSH
   tunnel/VPN. Do not flag missing TLS, missing rate limiting, or
   multi-tenant concerns. DO flag any path that would serve without an
   effective key or accept a non-loopback bind.

5. DAEMON COMPATIBILITY: data commands accept only a daemon runtime
   record carrying this binary's protocol revision and an effective API
   key, even when its version string matches. Missing or mismatched
   protocol metadata forces stop-and-replace before any data request;
   discovery for status/stop remains permissive so an incompatible daemon
   can still be found and shut down.

6. CONCURRENCY MODEL: one daemon holds the portable vault file lock exclusively for
   its lifetime; gc/verify/trash-empty serialize against mutations via
   the in-process maintenance gate, not the file lock. Id-addressed
   mutations require If-Match revisions; path mutations
   (POST /path/move, /path/trash) intentionally take no If-Match
   because they resolve and mutate inside one store transaction.

7. PLATFORM: Linux, macOS, and Windows are supported. The complete CLI,
   daemon, vault/tree lock, backup, and restore suites run on Windows amd64
   and arm64. Unix uses flock identities; Windows uses LockFileEx plus
   volume/file identities and rejects final reparse points. Do not reintroduce
   compile-only Windows lifecycle stubs.

8. LOCAL FILE TRUST: files under $DOCBANK_HOME are user-owned in an
   owner-private directory (0700 or a restricted DACL). An attacker with access to them already has the
   user's privileges; do not flag TOCTOU or permission races on
   vault-local paths. Restore targets and their parent paths have the same
   local-user trust boundary. Restore holds descriptor-confined roots so a
   pathname replacement cannot redirect writes, while hierarchy locks
   coordinate cooperating Docbank processes with stable root paths. Do not
   require those advisory locks to withstand a same-UID process arbitrarily
   reparenting a leased directory into another live vault: that requires write
   authority to the destination vault and already permits direct corruption.
   POST /ingest reads server-side local paths and
   is loopback-fenced per request by design. Reaching that loopback
   listener remotely (the documented SSH tunnel) requires an SSH
   account on the daemon host, which already grants filesystem access
   exceeding anything ingest exposes — do not flag tunneled loopback
   as an ingest capability bypass; there is no principal with the API
   key and tunnel access but without shell.

9. SINGLE-USER SCALE: do not flag O(n) scans, in-memory pagination, or
   missing batching at personal-archive scale unless the code path is
   plausibly hot at tens of thousands of nodes.

10. RELEASE SIGNING IS DEFERRED, ON RECORD: `docbank update` accepts
   unsigned SHA256 checksums (`AllowUnsignedChecksums: true`) as a
   deliberate decision — the only party who could tamper with release
   assets can compromise the repository, and a CI-held signing key
   would sign whatever that attacker releases. Ed25519 signing with an
   offline/protected key is tracked (kata issue "Sign releases for
   docbank update") for before the repo goes public. Do not re-flag
   unsigned release checksums; DO flag any weakening beyond this
   (e.g. skipping checksum verification itself).

11. INSTALLER BOOTSTRAP ORIGIN IS DELIBERATE: the documented install
   commands fetch scripts/install.sh and scripts/install.ps1 from
   docbank.ai, which serves the repository copies verbatim (the docs
   build copies them into the site root). Every curl|sh bootstrap
   trusts its origin equally — a GitHub raw URL would swap the single
   point of failure, not remove it — and the installers verify each
   archive against its GitHub release's SHA256SUMS before installing,
   so a compromised site cannot silently substitute binaries, only the
   bootstrap itself. setup.md documents the raw.githubusercontent
   command for readers who want a trust origin independent of the
   site's hosting. Do not re-flag docbank.ai-served install commands
   as a trust-boundary regression; DO flag installer changes that skip
   archive verification or make the served copy diverge from
   scripts/.

12. DOCS DESCRIBE MAIN: user-facing pages document the capabilities of
   main, which may be newer than the newest tagged release. A
   capability that is not yet in a tagged release must carry a release
   qualifier where users would act on it (homepage, setup). Flagging
   an unqualified unreleased capability is correct; demanding the
   capability's documentation be removed entirely is not. The public
   Zensical site is published only after the corresponding release tag
   exists; do not require source documentation for merged next-release
   work to be withheld from main merely because that site publication
   has not happened yet.

Do NOT flag issues that only apply to public-facing, multi-tenant, or
internet-exposed services. Focus on bugs, logic errors, data corruption
risks, and code quality issues.
"""
